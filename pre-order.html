<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Fender Guitars: PreOrder</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Section Webpage</title>
    <link rel="stylesheet" href="./styles/pre-order.css">
  </head>

  <body>
    <!-- Fixed header with navigation bar -->
    <header>
      <nav>
        <img src="./assets/fender logo.png" alt="">
        <a href="index.html">View Products</a>
        <a href="pre-order.html"><b>Pre-Order</b></a>
      </nav>
    </header>

    <a href="#top" class="back-to-top">Back to Customisation</a>

    <!-- Body -->
    <div class="content">
      <section id="Customisation"> <!--Customer cusomise the guitar-->

        <div id="webgi-canvas-container">
          
          <canvas id="webgi-canvas" class="canvasBG"></canvas>

        </div>

        <div id = "Customization-Buttons">
          <h6 class = "text"> 
            Main Body Colour:
          </h6>

          <ul class="Main-Body-colors"> <!-- <ul> for unordered lists, <ol> for ordered list -->
					  <li class="button-colors red"></li> <!-- list items -->
					  <li class="button-colors green"></li>
					  <li class="button-colors lightBlue"></li>
            <li class="button-colors darkBlue"></li> <!-- list items -->
					  <li class="button-colors purple"></li>
					  <li class="button-colors black"></li>
            <li class="button-colors white"></li>
				  </ul>

          <h6 class = "text"> 
            Pickguard Colour:
          </h6>

          <ul class="Pickguard-Materials"> <!-- <ul> for unordered lists, <ol> for ordered list -->
					  <li class="button-colors red"></li> <!-- list items -->
					  <li class="button-colors green"></li>
					  <li class="button-colors lightBlue"></li>
            <li class="button-colors darkBlue"></li> <!-- list items -->
					  <li class="button-colors purple"></li>
					  <li class="button-colors black"></li>
            <li class="button-colors white"></li>
				  </ul>

          <h6 class = "text"> 
            Neck Material:
          </h6>

          <ul class="Neck-Materials"> <!-- <ul> for unordered lists, <ol> for ordered list -->
					  <li class="button-colors light"></li> <!-- list items -->
					  <li class="button-colors dark"></li>
				  </ul>

        </div>
      </section>
      
      <section id="Details"> <!--What it comes with and guitar specs-->
          
      </section>

      <section id="OrderInfo"> <!--Customer order details-->
          
      </section>

      <!-- Footer -->
      <footer>
        &copy; Pre-Order Webpage Footer
      </footer>
    </div>

    <script src="./scripts/pre-order.js" type="module"></script>

  </body>
</html>
